name: "Quick Daily Scan"
description: "Fast scan for all active targets"
version: "1.0"

targets:
  - all  # Run on all active targets

modules:
  - name: source_code
    enabled: true
    timeout: 300
  
  - name: apk
    enabled: true
    timeout: 60

notifications:
  on_complete: true
  on_findings: true
  min_severity: "high"

output:
  format: "json"
  save_to_db: true
  generate_report: false
