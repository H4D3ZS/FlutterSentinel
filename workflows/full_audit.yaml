name: "Complete Security Audit"
description: "Full security assessment with all modules"
version: "2.0"

targets:
  - all

modules:
  - name: quick
    enabled: true
    timeout: 300
  
  - name: source_code
    enabled: true
    timeout: 600
  
  - name: apk
    enabled: true
    timeout: 120
  
  - name: jwt
    enabled: true
    timeout: 180
  
  - name: deeplink
    enabled: true
    timeout: 120

notifications:
  on_complete: true
  on_findings: true
  min_severity: "medium"

output:
  format: "json"
  save_to_db: true
  generate_report: true
